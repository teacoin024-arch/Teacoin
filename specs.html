<!DOCTYPE html>
<html dir="rtl" lang="ar">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>مواصفات TEA COIN</title>
    <style>
        body {
            background-color: #0d1117;
            color: #c9d1d9;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            margin: 0;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            padding: 20px;
        }
        .card {
            background-color: #161b22;
            border: 1px solid #30363d;
            border-radius: 15px;
            padding: 30px;
            max-width: 500px;
            width: 100%;
            text-align: center;
            box-shadow: 0 10px 30px rgba(0,0,0,0.5);
        }
        h1 {
            color: #58a6ff;
            margin-bottom: 20px;
        }
        .description-box {
            text-align: left; /* عشان الكلام بالإنجليزي يظهر مظبوط من الشمال */
            background: #0d1117;
            padding: 20px;
            border-radius: 10px;
            line-height: 1.6;
            border-left: 4px solid #58a6ff;
            margin-bottom: 25px;
            font-size: 16px;
        }
        .back-btn {
            display: inline-block;
            background-color: #238636;
            color: white;
            padding: 12px 25px;
            text-decoration: none;
            border-radius: 8px;
            font-weight: bold;
            transition: 0.3s;
        }
        .back-btn:hover { background-color: #2ea043; }
    </style>
</head>
<body>

    <div class="card">
        <h1>What is TEA COIN?</h1>
        
        <div class="description-box">
            Coins are a form of electronic money used for transactions. Like gold and other precious metals, their value fluctuates over time, which is why you might initially buy them cheaply, only to see their price rise. This is similar to the concept of gold.
        </div>

        <a href="index.html" class="back-btn">العودة للرئيسية</a>
    </div>

</body>
</html>
